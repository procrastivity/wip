# .pre-commit-config.yaml — fast per-commit gates.
# All wip-specific hooks are LOCAL (no upstream `repo:` deps). These mirror the
# *fast* half of `make check` (lint) plus hygiene + glossary drift. The full
# test suite is intentionally NOT run per-commit — it's slow, and "run tests
# before you commit" is a norm, not a per-commit enforcement. Run `make test`
# (or `make check`) before pushing; `contrib/release` gates on `make check`.
# Stock hygiene hooks come from pre-commit-hooks and are zero-config.
#
# Bootstrap once: `make hooks` (runs `pre-commit install`).
# Run on demand:  `pre-commit run --all-files`.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: shfmt
        name: shfmt -d -i 2 -ci
        entry: shfmt -d -i 2 -ci
        language: system
        files: '^(bin/wip-plumbing|lib/wip/.*\.bash|test/.*\.sh)$'

      - id: shellcheck
        name: shellcheck -x
        entry: shellcheck -x
        language: system
        files: '^(bin/wip-plumbing|lib/wip/.*\.bash|test/.*\.sh)$'

      - id: wip-glossary
        name: wip-plumbing glossary check
        entry: bin/wip-plumbing glossary check
        language: system
        pass_filenames: false
        files: '^(\.wip\.yaml|\.wip/GLOSSARY\.md|templates/glossary/.*\.md)$'

      - id: wip-agents-commands
        name: setup-agents commands in sync (ADR-0015)
        entry: contrib/sync-agents-commands --check
        language: system
        pass_filenames: false
        files: '^(commands/.*\.md|templates/setup/agents/commands/.*\.md|contrib/sync-agents-commands)$'

      - id: wip-active-backend
        name: active.md backend pointer in sync (ADR-0013)
        entry: bin/wip-plumbing orchestrate backend --check
        language: system
        pass_filenames: false
        files: '^(roles/backends/.*\.md|\.wip\.yaml)$'
